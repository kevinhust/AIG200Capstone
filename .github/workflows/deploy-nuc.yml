name: Deploy to NUC

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: health-butler-bot
  REGISTRY: ghcr.io
  REGISTRY_REPO: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to NUC
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NUC_HOST }}
          port: ${{ secrets.NUC_SSH_PORT }}
          username: kevin
          key: ${{ secrets.NUC_SSH_KEY }}
          envs: GITHUB_ACTOR,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            cd ~/health-butler

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest

            # Tag for local use
            docker tag ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:latest

            # Restart container
            docker compose up -d --remove-orphans

            # Cleanup old images
            docker image prune -f

            echo "Deployment complete!"
